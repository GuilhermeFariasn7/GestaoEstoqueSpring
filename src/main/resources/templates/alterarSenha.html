<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alterar Senha - Gestão de Estoque</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="d-flex align-items-center min-vh-100 bg-light">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
      <div class="login-box p-4">

        <form method="post" action="/alterarSenha">
          <input type="hidden" name="token" th:value="${token}" />

          <div class="text-center mb-4">
            <img class="logo img-fluid"
                 src="https://i.ibb.co/Fk6ZVNfV/alterarsenha.png"
                 alt="Alterar Senha"
                 style="max-height: 100px;">
          </div>

          <div th:if="${erro}" class="alert alert-danger" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i>
            <span th:text="${erro}"></span>
          </div>

          <div th:if="${sucesso}"
               class="alert alert-success"
               role="alert"
               th:attr="data-redirect=${rotaRedirect}">
            <i class="fas fa-check-circle me-2"></i>
            <span th:text="${sucesso}"></span>
          </div>

          <div class="input-group mb-3">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-lock"></i>
                            </span>
            <input type="password"
                   class="form-control"
                   id="senhaInput"
                   name="senha"
                   placeholder="Nova senha"
                   th:value="${senha}"
                   required />
            <span class="input-group-text bg-white" id="toggleSenha" style="cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </span>
          </div>

          <div class="input-group mb-4">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-lock"></i>
                            </span>
            <input type="password"
                   class="form-control"
                   id="confSenhaInput"
                   name="confirmaSenha"
                   placeholder="Confirmar nova senha"
                   th:value="${confirmaSenha}"
                   required />
            <span class="input-group-text bg-white" id="toggleConfSenha" style="cursor: pointer;">
                                <i class="fas fa-eye"></i>
                            </span>
          </div>

          <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
            <i class="fas fa-key me-2"></i>Alterar Senha
          </button>

          <div class="text-center">
            <a href="/login" class="text-decoration-none">
              <i class="fas fa-arrow-left me-2"></i>Voltar para o Login
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/style.js}"></script>
</body>
</html>

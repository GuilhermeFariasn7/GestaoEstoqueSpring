<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Cliente - Gestão de Estoque</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Sans&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="/style.css"/>

</head>
<body>

<header class="header-slim">
    <div class="container-slim">
        <div class="d-flex align-items-center">
            <a href="/mainCliente" class="btn btn-link text-dark p-0 me-3">
                <i class="fas fa-arrow-left fa-lg"></i>
            </a>
            <h2 class="h5 mb-0">
                <i class="fas fa-address-card text-primary me-2"></i>
                Edição de Cliente
            </h2>
        </div>
    </div>
</header>

<div class="container-slim mt-3">
    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
            <div class="login-box">

                <form action="/atualizarCliente" method="post" enctype="multipart/form-data" id="cadastro-form">

                    <input type="hidden" name="id" th:value="${cliente.id}"/>

                    <!-- Mensagens -->
                    <div th:if="${erro}" class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span th:text="${erro}"></span>
                    </div>

                    <div th:if="${sucesso}" class="alert alert-success" role="alert" th:attr="data-redirect=${rotaRedirect}">
                        <i class="fas fa-check-circle me-2"></i>
                        <span th:text="${sucesso}"></span>
                    </div>

                    <!-- Área de foto -->
                    <div class="text-center mb-1">
                        <div class="foto-upload">
                            <div class="mb-2">
                                <img th:src="${cliente.fotoUrl != null ? cliente.fotoUrl : '/img/no-image.jpg'}"
                                     onerror="this.src='/img/no-image.jpg'"
                                     class="rounded-circle border shadow-sm"
                                     style="width: 120px; height: 120px; object-fit: cover;">
                            </div>
                            <div class="input-group input-group-sm">
                                <input type="file" class="form-control" name="foto" id="inputFoto" accept="image/*">
                                <label class="input-group-text" for="inputFoto">
                                    <i class="fas fa-camera"></i>
                                </label>
                            </div>
                        </div>
                    </div>

                    <!-- Container com scroll APENAS para os campos -->
                    <div class="campos-scroll">

                        <!-- Nome -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-user text-muted"></i>
                            </span>
                            <input type="text" class="form-control" name="nome" placeholder="Nome do cliente" required
                                   th:value="${cliente.nome}"/>
                        </div>

                        <!-- CPF -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-id-card text-muted"></i>
                            </span>
                            <input type="text" class="form-control" name="cpf" placeholder="CPF" id="cpf"
                                   th:value="${cliente.cpf}"/>
                        </div>

                        <!-- CNPJ -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-building text-muted"></i>
                            </span>
                            <input type="text" class="form-control" name="cnpj" placeholder="CNPJ" id="cnpj"
                                   th:value="${cliente.cnpj}"/>
                        </div>

                        <!-- Telefone -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-phone text-muted"></i>
                            </span>
                            <input type="text" class="form-control" name="telefone" placeholder="Telefone" id="telefone"
                                   th:value="${cliente.telefone}"/>
                        </div>

                        <!-- Email -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-envelope text-muted"></i>
                            </span>
                            <input type="email" class="form-control" name="email" placeholder="E-mail"
                                   th:value="${cliente.email}"/>
                        </div>

                        <!-- Tipo -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-tags text-muted"></i>
                            </span>
                            <input type="text" class="form-control" name="tipo" placeholder="Tipo de cliente"
                                   th:value="${cliente.tipo}"/>
                        </div>

                        <!-- Descrição -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-align-left text-muted"></i>
                            </span>
                            <input type="text" class="form-control" name="descricao" placeholder="Descrição"
                                   th:value="${cliente.descricao}"/>
                        </div>

                        <!-- Ramo -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-sitemap text-muted"></i>
                            </span>
                            <select class="form-select" name="ramoId" required>
                                <option value="">Selecione o ramo</option>
                                <option th:each="ramo : ${ramos}"
                                        th:value="${ramo.idramo}"
                                        th:text="${ramo.idramo + ' - ' + ramo.nome}"
                                        th:selected="${ramo.idramo == cliente.ramo.idramo}">
                                </option>
                            </select>
                        </div>

                        <!-- Estado -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-map text-muted"></i>
                            </span>
                            <select class="form-select" id="estado" name="estado" required>
                                <option value="">Selecione o estado</option>
                                <option th:each="estado : ${estados}"
                                        th:value="${estado.idestado}"
                                        th:text="${estado.idestado + ' - ' + estado.descricao}"
                                        th:selected="${estado.idestado == cliente.cidade.estado.idestado}">
                                </option>
                            </select>
                        </div>

                        <!-- Cidade -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-city text-muted"></i>
                            </span>
                            <select class="form-select" id="cidade" name="cidade" required>
                                <option value="">Selecione a cidade</option>
                                <option th:each="cidade : ${cidades}"
                                        th:value="${cidade.idcidade}"
                                        th:text="${cidade.nome}"
                                        th:attr="data-estado=${cidade.estado.idestado}"
                                        th:selected="${cidade.idcidade == cliente.cidade.idcidade}">
                                </option>
                            </select>
                        </div>

                        <!-- Entrega programada -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-truck text-muted"></i>
                            </span>
                            <select class="form-select" name="entregaProgramada">
                                <option value="0" th:selected="${cliente.entregaProgramada == 0}">Entrega não programada</option>
                                <option value="1" th:selected="${cliente.entregaProgramada == 1}">Entrega programada</option>
                            </select>
                        </div>

                        <!-- Dias entrega -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-calendar-days text-muted"></i>
                            </span>
                            <input type="number" class="form-control" name="diasEntregaProgramada"
                                   placeholder="Dias para entrega"
                                   th:value="${cliente.diasEntregaProgramada}"/>
                        </div>

                        <!-- Status -->
                        <div class="input-group mb-2">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-toggle-on text-muted"></i>
                            </span>
                            <select class="form-select" name="status" required>
                                <option value="">Selecione o status</option>
                                <option value="ATIVO" th:selected="${cliente.status == 'ATIVO'}">Ativo</option>
                                <option value="INATIVO" th:selected="${cliente.status == 'INATIVO'}">Inativo</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Botão flutuante verde no canto -->
<button type="submit" form="cadastro-form" class="botao-flutuante-salvar">
    <i class="fas fa-save"></i>
</button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/inputmask@5.0.8/dist/inputmask.min.js"></script>
<script th:src="@{/js/style.js}"></script>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        Inputmask("999.999.999-99").mask(document.getElementById('cpf'));
        Inputmask("99.999.999/9999-99").mask(document.getElementById('cnpj'));
        Inputmask("(99) 99999-9999").mask(document.getElementById('telefone'));
    });
</script>
</body>
</html>

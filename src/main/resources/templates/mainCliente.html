<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Clientes - Gestão de Estoque</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
</head>
<body class="with-header bg-light">

<header>
    <div th:replace="fragments/header :: mainHeader"></div>
</header>

<main class="container-fluid py-4">
    <div class="card shadow-sm">
        <div class="card-body">

            <!-- Formulário de busca padronizado com o de produtos -->
            <form class="row g-3 mb-4" method="get" action="/mainCliente">
                <div class="col-12 col-md-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="fas fa-hashtag text-muted"></i>
                        </span>
                        <input type="number" class="form-control" name="codigo" placeholder="Código" th:value="${param.codigo}">
                    </div>
                </div>

                <div class="col-12 col-md-4">
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="fas fa-user text-muted"></i>
                        </span>
                        <input type="text" class="form-control" name="nome" placeholder="Nome do cliente" th:value="${param.nome}">
                    </div>
                </div>

                <div class="col-12 col-md-3">
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="fas fa-id-card text-muted"></i>
                        </span>
                        <input type="text" class="form-control" name="cpf" placeholder="CPF ou CNPJ" th:value="${param.cpf}">
                    </div>
                </div>

                <div class="col-12 col-md-2">
                    <button type="submit" class="btn btn-primary w-100 h-100 d-flex align-items-center justify-content-center gap-2">
                        <i class="fas fa-search"></i>
                        <span class="d-none d-sm-inline">Buscar</span>
                    </button>
                </div>
            </form>

            <!-- Versão Desktop - Tabela (igual ao produtos) -->
            <div class="d-none d-xl-block">
                <div class="table-container">
                    <table class="table table-hover align-middle">
                        <thead class="table-dark">
                        <tr>
                            <th style="width: 50px;"></th>
                            <th style="width: 80px;">Foto</th>
                            <th>Código</th>
                            <th>Nome</th>
                            <th>CPF/CNPJ</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th style="width: 100px;">Status</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="cliente : ${clientes}"
                            th:onclick="'window.location.href=\'/editarCliente/' + ${cliente.id} + '\';'"
                            th:classappend="${cliente.status == 'INATIVO'} ? 'table-danger' : ''"
                            style="cursor:pointer;">
                            <td onclick="event.stopPropagation();">
                                <button type="button" class="btn btn-sm btn-danger" th:attr="data-id=${cliente.id}" title="Excluir">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                            <td>
                                <img th:src="${cliente.fotoUrl != null ? cliente.fotoUrl : '/img/no-image.jpg'}"
                                     onerror="this.src='/img/no-image.jpg'"
                                     width="50" height="50"
                                     style="object-fit:cover; border-radius:8px;">
                            </td>
                            <td th:text="${cliente.id}" class="fw-bold"></td>
                            <td th:text="${cliente.nome}" class="fw-bold"></td>
                            <td th:text="${#strings.isEmpty(cliente.cpf) ? cliente.cnpj : cliente.cpf}"></td>
                            <td th:text="${cliente.telefone}"></td>
                            <td th:text="${cliente.email}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${cliente.status == 'ATIVO'} ? 'bg-success' : 'bg-danger'"
                                      th:text="${cliente.status}">
                                </span>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Versão Tablet - Cards (igual ao produtos) -->
            <div class="d-none d-md-block d-xl-none">
                <div class="cards-scroll">
                    <div class="row g-3">
                        <div class="col-md-6" th:each="cliente : ${clientes}">
                            <div class="card shadow-sm h-100"
                                 th:classappend="${cliente.status == 'INATIVO'} ? 'border-danger' : ''"
                                 style="cursor:pointer;"
                                 th:onclick="'window.location.href=\'/editarCliente/' + ${cliente.id} + '\';'">
                                <div class="card-body">
                                    <div class="d-flex gap-3">
                                        <img th:src="${cliente.fotoUrl != null ? cliente.fotoUrl : '/img/no-image.jpg'}"
                                             onerror="this.src='/img/no-image.jpg'"
                                             width="80" height="80"
                                             style="object-fit:cover; border-radius:8px;">
                                        <div class="flex-grow-1">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <h6 class="mb-1 fw-bold" th:text="${cliente.nome}"></h6>
                                                <span class="badge"
                                                      th:classappend="${cliente.status == 'ATIVO'} ? 'bg-success' : 'bg-danger'"
                                                      th:text="${cliente.status}">
                                                </span>
                                            </div>
                                            <div class="small text-muted mb-1">
                                                <i class="fas fa-hashtag me-1"></i> Código: <span th:text="${cliente.id}"></span>
                                            </div>
                                            <div class="small text-muted mb-1">
                                                <i class="fas fa-id-card me-1"></i> <span th:text="${#strings.isEmpty(cliente.cpf) ? cliente.cnpj : cliente.cpf}"></span>
                                            </div>
                                            <div class="small text-muted mb-1">
                                                <i class="fas fa-phone me-1"></i> <span th:text="${cliente.telefone}"></span>
                                            </div>
                                            <div class="small text-muted">
                                                <i class="fas fa-envelope me-1"></i> <span th:text="${cliente.email}"></span>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mt-3 d-flex justify-content-end gap-2" onclick="event.stopPropagation();">
                                        <a class="btn btn-sm btn-outline-success" th:href="@{/editarCliente/{id}(id=${cliente.id})}" title="Editar">
                                            <i class="fas fa-pen"></i>
                                        </a>
                                        <button class="btn btn-sm btn-outline-danger" th:attr="data-id=${cliente.id}" title="Excluir">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Versão Mobile - Cards simples (igual ao produtos) -->
            <div class="d-md-none">
                <div class="cards-scroll">
                    <div class="row g-2">
                        <div class="col-12" th:each="cliente : ${clientes}">
                            <div class="card shadow-sm"
                                 th:classappend="${cliente.status == 'INATIVO'} ? 'border-danger' : ''"
                                 style="cursor:pointer;"
                                 th:onclick="'window.location.href=\'/editarCliente/' + ${cliente.id} + '\';'">
                                <div class="card-body p-3">
                                    <div class="d-flex gap-2">
                                        <img th:src="${cliente.fotoUrl != null ? cliente.fotoUrl : '/img/no-image.jpg'}"
                                             onerror="this.src='/img/no-image.jpg'"
                                             width="60" height="60"
                                             style="object-fit:cover; border-radius:8px;">
                                        <div class="flex-grow-1">
                                            <div class="d-flex justify-content-between">
                                                <h6 class="mb-0 fw-bold" th:text="${cliente.nome}"></h6>
                                                <span class="badge"
                                                      th:classappend="${cliente.status == 'ATIVO'} ? 'bg-success' : 'bg-danger'"
                                                      th:text="${cliente.status}">
                                                </span>
                                            </div>
                                            <div class="small text-muted">
                                                <span th:text="${#strings.isEmpty(cliente.cpf) ? cliente.cnpj : cliente.cpf}"></span>
                                            </div>
                                            <div class="small text-muted" th:text="${cliente.telefone}"></div>
                                            <div class="small text-muted text-truncate" th:text="${cliente.email}"></div>
                                        </div>
                                    </div>
                                    <div class="mt-2 d-flex justify-content-end gap-1" onclick="event.stopPropagation();">
                                        <a class="btn btn-sm btn-success" th:href="@{/editarCliente/{id}(id=${cliente.id})}" title="Editar">
                                            <i class="fas fa-pen"></i>
                                        </a>
                                        <button class="btn btn-sm btn-danger" th:attr="data-id=${cliente.id}" title="Excluir">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mensagem quando não há resultados -->
            <div th:if="${#lists.isEmpty(clientes)}" class="text-center py-5">
                <i class="fas fa-users fa-3x text-muted mb-3"></i>
                <h5 class="text-muted">Nenhum cliente encontrado</h5>
                <p class="text-muted">Tente ajustar os filtros de busca ou cadastre um novo cliente.</p>
                <a href="/novoCliente" class="btn btn-primary mt-2">
                    <i class="fas fa-plus me-2"></i>Novo Cliente
                </a>
            </div>
        </div>
    </div>

    <!-- Botão flutuante para novo cliente -->
    <a href="/novoCliente" class="botao-flutuante-novo" title="Novo Cliente">
        <i class="fas fa-plus"></i>
    </a>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/style.js}"></script>
</body>
</html>

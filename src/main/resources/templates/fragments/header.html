                </button>
                <div class="mx-auto">

                </div>

                            <span th:text="${filialId + ' - ' + filialUsuario}">Filial</span>

                    </div>

                        <a href="/logout" class="text-white" title="Sair">

                        </a>
                    </div>
                </div>

                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link py-3 d-flex align-items-center" href="/mainProduto">
                        <i class="fas fa-boxes-stacked me-3 fa-fw"></i> Produtos
                    </a>
                </li>
                <li class="nav-item">

                    </span>
                </li>
            </ul>

    <style>
        /* Estilos refinados para o menu desktop */
        .nav-menu {
            list-style: none;
            margin: 0;
            padding: 0;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 4px;
        }

        .nav-menu .nav-item {
            margin: 0;
        }

        .nav-menu .nav-link {
            color: rgba(255,255,255,0.85);
            font-weight: 500;
            border-radius: 50px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-menu .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }

        .nav-menu .nav-link:active {
            transform: translateY(0);
        }

        /* Indicador de página ativa (opcional - precisa adicionar lógica no backend) */
        .nav-menu .nav-link.active {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* Ajustes para o ícone de logout */
        .fa-right-from-bracket {
            transition: transform 0.3s ease;
        }

        .fa-right-from-bracket:hover {
            transform: scale(1.1);
        }

        /* Melhorias para o menu mobile */
        @media (max-width: 767px) {
            .collapse .nav-link {
                border-left: 3px solid transparent;
                transition: all 0.2s ease;
            }

            .collapse .nav-link:hover {
                border-left-color: white;
                background: rgba(255,255,255,0.1);
            }

            .fa-fw {

                text-align: center;
            }

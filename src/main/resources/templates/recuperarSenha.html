<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Gestão de Estoque</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/style.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="d-flex align-items-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
            <div class="login-box p-4">

                <div class="login-box-imglogo text-center mb-4">
                    <img src="https://i.ibb.co/fggZm9H/recuperar-Senha.png"
                         alt="recuperar-Senha"
                         class="recuperaSenha img-fluid"
                         style="max-height: 400px;">
                </div>

                <div th:if="${erro}" class="alert alert-danger" role="alert">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    <span th:text="${erro}"></span>
                </div>

                <div th:if="${sucesso}"
                     class="alert alert-success"
                     role="alert"
                     th:attr="data-redirect=${rotaRedirect}">
                    <i class="fas fa-check-circle me-2"></i>
                    <span th:text="${sucesso}"></span>
                </div>

                <form method="post" action="/recuperarSenha">
                    <div class="input-group mb-4">
                            <span class="input-group-text bg-white">
                                <i class="fas fa-envelope"></i>
                            </span>
                        <input type="email"
                               class="form-control"
                               name="email"
                               placeholder="Digite seu Email"
                               required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                        <i class="fas fa-paper-plane me-2"></i>Enviar Link de Recuperação
                    </button>
                </form>

                <div class="text-center">
                    <a th:href="@{/login}" class="text-decoration-none">
                        <i class="fas fa-arrow-left me-2"></i>Voltar para o Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/style.js}"></script>
</body>
</html>

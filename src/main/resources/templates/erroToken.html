<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Token Inválido - Gestão de Estoque</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/style.css}" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body class="d-flex align-items-center min-vh-100">
<div class="container">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
      <div class="login-box p-4 text-center">

        <div class="mb-4">
          <i class="fas fa-exclamation-triangle text-danger" style="font-size: 5rem;"></i>
        </div>

        <h2 class="h4 mb-3">Token Inválido</h2>

        <div class="alert alert-danger mb-4" role="alert">
          <i class="fas fa-exclamation-circle me-2"></i>
          <span th:text="${erro}">O token de recuperação é inválido ou expirou</span>
        </div>

        <a href="/login" class="btn btn-primary px-4">
          <i class="fas fa-arrow-left me-2"></i>Voltar ao Login
        </a>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Gestão de Estoque</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libertinus+Sans:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="bg-light" style="overflow-y: auto; height: 100vh;">
<div class="container py-4 py-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
            <div class="dashboard p-3 p-md-4">

                <!-- Header com saudação e imagem -->
                <div class="welcome mb-4 mb-md-5">
                    <div class="row align-items-center g-3">
                        <div class="col-12 col-md-8">
                            <div class="d-flex align-items-center gap-2 mb-2">
                                <i class="fas fa-hand-wave text-primary" style="font-size: 1.8rem;"></i>
                                <h2 class="h3 mb-0" th:text="'Olá, ' + ${nomeUsuario} + '!'">Olá, Usuário!</h2>
                            </div>
                            <p class="text-muted lead mb-0 fs-6 fs-md-5">
                                O que você deseja fazer hoje?
                            </p>
                            <p class="text-muted small">
                                Selecione uma das opções abaixo para começar
                            </p>
                        </div>
                        <div class="col-12 col-md-4 text-center text-md-end">
                            <img src="https://i.ibb.co/TD2qpJ6w/plimhome.png"
                                 alt="Gestão de Estoque"
                                 class="img-fluid"
                                 style="max-height: 100px; opacity: 0.9;">
                        </div>
                    </div>
                </div>

                <!-- Cards de módulos -->
                <div class="modules">
                    <div class="row g-3 g-md-4">
                        <div class="col-12 col-sm-6 col-lg">
                            <a href="/mainCliente" class="card text-decoration-none h-100 border-0 shadow-sm">
                                <div class="card-body text-center p-3 p-md-4">
                                    <div class="rounded-circle bg-primary bg-opacity-10 p-2 p-md-3 d-inline-block mb-2 mb-md-3">
                                        <i class="fas fa-user-friends fa-2x text-primary"></i>
                                    </div>
                                    <h5 class="card-title fw-bold fs-6 fs-md-5">Clientes</h5>
                                    <p class="card-text small text-muted d-none d-sm-block">Gerencie seus clientes</p>
                                </div>
                            </a>
                        </div>

                        <div class="col-12 col-sm-6 col-lg">
                            <a href="/mainProduto" class="card text-decoration-none h-100 border-0 shadow-sm">
                                <div class="card-body text-center p-3 p-md-4">
                                    <div class="rounded-circle bg-success bg-opacity-10 p-2 p-md-3 d-inline-block mb-2 mb-md-3">
                                        <i class="fas fa-cubes fa-2x text-success"></i>
                                    </div>
                                    <h5 class="card-title fw-bold fs-6 fs-md-5">Produtos</h5>
                                    <p class="card-text small text-muted d-none d-sm-block">Cadastre e consulte produtos</p>
                                </div>
                            </a>
                        </div>

                        <div class="col-12 col-sm-6 col-lg">
                            <a href="/mainEstoque" class="card text-decoration-none h-100 border-0 shadow-sm">
                                <div class="card-body text-center p-3 p-md-4">
                                    <div class="rounded-circle bg-warning bg-opacity-10 p-2 p-md-3 d-inline-block mb-2 mb-md-3">
                                        <i class="fas fa-boxes fa-2x text-warning"></i>
                                    </div>
                                    <h5 class="card-title fw-bold fs-6 fs-md-5">Estoque</h5>
                                    <p class="card-text small text-muted d-none d-sm-block">Controle seu estoque</p>
                                </div>
                            </a>
                        </div>

                        <div class="col-12 col-sm-6 col-lg">
                            <a href="/mainRelatorio" class="card text-decoration-none h-100 border-0 shadow-sm">
                                <div class="card-body text-center p-3 p-md-4">
                                    <div class="rounded-circle bg-info bg-opacity-10 p-2 p-md-3 d-inline-block mb-2 mb-md-3">
                                        <i class="fas fa-chart-line fa-2x text-info"></i>
                                    </div>
                                    <h5 class="card-title fw-bold fs-6 fs-md-5">Relatórios</h5>
                                    <p class="card-text small text-muted d-none d-sm-block">Visualize análises</p>
                                </div>
                            </a>
                        </div>

                        <div class="col-12 col-sm-6 col-lg">
                            <a href="/logout" class="card text-decoration-none h-100 border-0 shadow-sm">
                                <div class="card-body text-center p-3 p-md-4">
                                    <div class="rounded-circle bg-danger bg-opacity-10 p-2 p-md-3 d-inline-block mb-2 mb-md-3">
                                        <i class="fas fa-sign-out-alt fa-2x text-danger"></i>
                                    </div>
                                    <h5 class="card-title fw-bold fs-6 fs-md-5">Sair</h5>
                                    <p class="card-text small text-muted d-none d-sm-block">Encerrar sessão</p>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Rodapé informativo para mobile -->
                <div class="text-center mt-4 d-block d-sm-none">
                    <small class="text-muted">
                        <i class="fas fa-arrow-up me-1"></i>
                        Arraste para cima para ver mais opções
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
